                        </div>
                    </div>

                    <div className="hidden print-only">
                        <div className="kop-surat"><h1>PENGURUS RUKUN TETANGGA (RT)</h1><h1>{identity?.name || 'Aplikasi Arisan'}</h1><p>{identity?.subtitle || ''}</p></div>
                        <div className="text-center mb-6"><h2 className="text-[14pt] font-bold underline uppercase mb-1">Buku Induk &amp; Evaluasi Warga</h2><p className="text-[11pt]">Siklus Ke-{cycleNumber || 1} | Putaran Ke-{currentRound} | Periode: {formatBulanTahun(arisanPeriod)}</p></div>
                        <table className="print-table">
                            <thead><tr><th width="5%">No</th><th width="30%">Nama Warga</th><th width="15%">Program</th><th width="15%">Status Arisan</th><th width="15%">Tunggakan</th><th width="20%">Keterangan</th></tr></thead>
                            <tbody>
                                {members.length === 0 ? <tr><td colSpan="6" className="text-center font-bold">Belum ada data.</td></tr> : members.map((m, idx) => (
                                    <tr key={m.id}>
                                        <td className="text-center font-bold">{idx + 1}</td>
                                        <td className="font-bold">{m.name} {m.status === 'Meninggal' && <span style={{fontSize:'9px', background:'#eee', padding:'2px'}}>Wafat</span>}{m.status === 'Nonaktif' && <span style={{fontSize:'9px', background:'#eee', padding:'2px'}}>Nonaktif</span>}</td>
                                        <td className="text-center font-bold">{m.program === 'IuranOnly' ? 'Iuran Saja' : 'Arisan + Iuran'}</td>
                                        <td className="text-center font-bold">{m.program === 'IuranOnly' ? '-' : (m.hasWon ? `Menang (Put.${m.wonRound})` : 'Belum')}</td>
                                        <td className="text-right font-bold">{m.debt > 0 ? formatRp(m.debt) : '-'}</td><td></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        <div className="ttd-container">
                            <div className="ttd-box"><p>Mengetahui,</p><p>Ketua RT</p><div className="ttd-space"></div><p className="ttd-name">( ................................... )</p></div>
                            <div className="ttd-box"><p>Dibuat Oleh,</p><p>Sekretaris / Admin</p><div className="ttd-space"></div><p className="ttd-name">( ................................... )</p></div>
                        </div>
                    </div>

                    <div className="space-y-4 no-print">
                        {members.map((member) => (
                            <div key={member.id} className="bg-white rounded-[24px] p-6 flex flex-col sm:flex-row sm:items-center justify-between border-2 border-slate-200 shadow-sm hover:shadow-lg hover:-translate-y-1 hover:border-google-blue/40 transition-all duration-300 gap-5 group">
                                <div className="flex items-center gap-5 flex-1">
                                    <div className={`w-16 h-16 rounded-[20px] flex items-center justify-center font-extrabold text-[24px] shrink-0 border-2 transition-colors duration-300 ${isNonaktif(member) ? 'bg-slate-50 text-slate-400 border-slate-200' : 'bg-google-blueLight text-google-blueDark border-google-blue/30 group-hover:bg-google-blue group-hover:text-white group-hover:border-google-blueDark'}`}>{member.name.charAt(0).toUpperCase()}</div>
                                    <div className="flex-1 min-w-0">
                                        <h3 className={`font-extrabold text-[18px] truncate transition-colors tracking-tight ${isNonaktif(member) ? 'text-slate-400 line-through' : 'text-google-text group-hover:text-google-blueDark'}`}>{member.name} {isNonaktif(member) && <span className="text-[10px] uppercase tracking-wider bg-slate-100 text-slate-500 px-2.5 py-1 rounded-md ml-2 font-extrabold border-2 border-slate-200 align-middle">{member.status === 'Meninggal' ? 'Wafat' : 'Nonaktif'}</span>}</h3>
                                        <div className="flex flex-wrap items-center gap-2.5 mt-2.5 text-[11px] uppercase tracking-wider">
                                            <span className={`px-3 py-1.5 rounded-md font-extrabold border-2 ${member.program === 'IuranOnly' ? 'bg-slate-50 text-google-textVariant border-slate-200' : 'bg-google-blue/10 text-google-blueDark border-google-blue/20'}`}>{member.program === 'IuranOnly' ? 'Hanya Iuran' : 'Arisan & Iuran'}</span>
                                            {member.program !== 'IuranOnly' && (member.hasWon ? <span className="bg-google-blue text-white px-3 py-1.5 rounded-md font-extrabold shadow-sm border-2 border-google-blueDark flex items-center gap-1"><Icon name="emoji_events" className="text-[14px]"/> Menang Put. {member.wonRound}</span> : <span className="text-google-textVariant px-3 py-1.5 rounded-md bg-slate-100 font-extrabold border-2 border-slate-200">Belum Menang</span>)}
                                            {member.debt > 0 ? <span className="bg-google-redLight text-google-redDark px-3 py-1.5 rounded-md font-extrabold border-2 border-google-red/40 animate-pulse flex items-center gap-1.5"><Icon name="warning" className="text-[14px]"/> Tunggakan {formatRp(member.debt)}</span> : <span className="bg-google-greenLight text-google-greenDark px-3 py-1.5 rounded-md font-extrabold border-2 border-google-green/40 flex items-center gap-1.5"><Icon name="check_circle" className="text-[14px]"/> Aman</span>}
                                        </div>
                                    </div>
                                </div>
                                {userRole === 'admin' && (
                                    <div className="flex items-center gap-2.5 shrink-0 border-t-2 sm:border-t-0 border-slate-100 pt-5 sm:pt-0 justify-end w-full sm:w-auto opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                        <button onClick={() => { setFormData(member); setEditingId(member.id); setIsFormOpen(true); setErrorMsg(''); }} className="bg-white text-google-text px-5 py-2.5 rounded-full font-extrabold text-[13px] border-2 border-slate-200 shadow-sm hover:border-google-blue hover:text-google-blue active:scale-95 transition-all duration-300 flex items-center justify-center gap-1.5"><Icon name="edit" className="text-[16px]" /><span className="sm:hidden">Edit</span></button>
                                        <button onClick={() => setDeleteConfirmId(member.id)} className="bg-white text-google-red px-5 py-2.5 rounded-full font-extrabold text-[13px] border-2 border-slate-200 shadow-sm hover:border-google-red hover:bg-google-redLight active:scale-95 transition-all duration-300 flex items-center justify-center gap-1.5"><Icon name="delete" className="text-[16px]" /><span className="sm:hidden">Hapus</span></button>
                                    </div>
                                )}
                            </div>
                        ))}
                        {members.length === 0 && <div className="bg-white rounded-[32px] border-2 border-slate-200 p-12 text-center shadow-sm"><div className="bg-slate-50 w-24 h-24 flex items-center justify-center rounded-full mb-5 mx-auto border-2 border-slate-200"><Icon name="group_off" className="text-[48px] text-slate-400" fill="true" /></div><p className="text-google-text font-extrabold text-[20px] tracking-tight">Belum ada Warga</p><p className="text-[15px] font-medium text-google-textVariant mt-1.5">Silakan tambahkan data warga baru.</p></div>}
                    </div>

                    {isFormOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-6 no-print ">
                            <div className="max-h-[85vh] overflow-y-auto hide-scrollbar bg-white rounded-[32px] p-6 sm:p-8 w-full max-w-md border-2 border-slate-200 shadow-2xl transform scale-100 transition-transform">
                                <h3 className="text-2xl font-extrabold text-google-text mb-6 tracking-tight">{editingId ? 'Edit Data Warga' : 'Tambah Warga Baru'}</h3>
                                <div className="space-y-5">
                                    <div><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Nama Lengkap</label><input type="text" value={formData.name} onChange={e => {setFormData({...formData, name: e.target.value}); setErrorMsg('');}} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text placeholder:text-slate-400" placeholder="Masukkan nama..." /></div>
                                    <div><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Program Keikutsertaan</label><select value={formData.program || 'Arisan'} onChange={e => setFormData({...formData, program: e.target.value, hasWon: false, wonRound: ''})} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text cursor-pointer"><option value="Arisan">Full (Arisan &amp; Iuran)</option><option value="IuranOnly">Hanya Iuran Umum Saja</option></select></div>
                                    <div className="flex gap-5">
                                        <div className="flex-1"><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Status</label><select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text cursor-pointer"><option value="Normal">Aktif</option><option value="Meninggal">Meninggal / Wafat</option><option value="Nonaktif">Nonaktif / Pindah</option></select></div>
                                        <div className="flex-1"><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Tunggakan (Rp)</label><input type="number" min="0" value={formData.debt} onChange={e => {setFormData({...formData, debt: e.target.value}); setErrorMsg('');}} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text placeholder:text-slate-400" placeholder="0" /></div>
                                    </div>
                                    {formData.program !== 'IuranOnly' && (
                                        <div className="pt-5 border-t-2 border-slate-100">
                                            <label className="flex items-center gap-3 mb-5 cursor-pointer group"><div className="relative flex items-center justify-center"><input type="checkbox" checked={formData.hasWon} onChange={e => setFormData({...formData, hasWon: e.target.checked})} className="peer appearance-none w-6 h-6 border-2 border-slate-300 rounded-lg checked:bg-google-blue checked:border-google-blue transition-colors cursor-pointer" /><Icon name="check" className="absolute text-white text-[16px] opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" strokeWidth="4"/></div><span className="text-[14px] font-extrabold text-google-text group-hover:text-google-blue transition-colors">Warga Sudah Menang Arisan</span></label>
                                            {formData.hasWon && <div><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Di Putaran Ke-</label><input type="number" min="1" value={formData.wonRound} onChange={e => {setFormData({...formData, wonRound: e.target.value}); setErrorMsg('');}} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text placeholder:text-slate-400" placeholder="Misal: 3" /></div>}
                                        </div>
                                    )}
                                </div>
                                {errorMsg && <div className="bg-google-redLight border-2 border-google-red/40 text-google-redDark font-extrabold text-[13px] px-4 py-3.5 rounded-[16px] mt-5 flex items-center gap-2"><Icon name="error" className="text-[18px] shrink-0"/><span>{errorMsg}</span></div>}
                                <div className="flex gap-3 mt-8 pt-6 border-t-2 border-slate-100">
                                    <button onClick={() => { setIsFormOpen(false); setErrorMsg(''); }} className="flex-1 bg-white text-google-text px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-all duration-300 shadow-sm flex items-center justify-center">Batal</button>
                                    <button onClick={handleSave} className="flex-1 bg-google-blue text-white px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-google-blueDark shadow-md hover:bg-google-blueDark hover:shadow-lg active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {deleteConfirmId && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-6 no-print transition-opacity">
                            <div className="max-h-[85vh] overflow-y-auto hide-scrollbar bg-white rounded-[32px] p-8 w-full max-w-sm text-center shadow-2xl border-2 border-slate-200 transform scale-100 transition-transform">
                                <div className="mb-5 bg-google-redLight w-20 h-20 rounded-full flex items-center justify-center mx-auto border-2 border-google-red/30"><Icon name="person_remove" className="text-[40px] text-google-red" /></div>
                                <h3 className="text-2xl font-extrabold text-google-text mb-2 tracking-tight">Hapus Warga?</h3>
                                <p className="text-[14px] font-medium text-google-textVariant mb-8 leading-relaxed">Data warga dan riwayatnya akan dihapus permanen.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteConfirmId(null)} className="flex-1 bg-white text-google-text px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-all duration-300 shadow-sm flex items-center justify-center">Batal</button>
                                    <button onClick={executeDelete} className="flex-1 bg-google-red text-white px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-google-redDark shadow-md hover:bg-google-redDark hover:shadow-lg active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function IuranUmum({ iuranData, setIuranData, members, userRole, kasRtBalance, setKasRtBalance, kasRtTransactions, setKasRtTransactions, identity }) {
            const [view, setView] = useState('list');
            const [selectedAgenda, setSelectedAgenda] = useState(null);
            const [formData, setFormData] = useState({ title: '', minAmount: 0, dueDate: getLocalDate(), payments: {}, transferredToKas: 0 });
            const [tempPayments, setTempPayments] = useState({});
            const [transferAmount, setTransferAmount] = useState('');
            const [isTransferModalOpen, setIsTransferModalOpen] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            // FIX: Tambah state untuk konfirmasi hapus agenda
            const [deleteConfirmAgendaId, setDeleteConfirmAgendaId] = useState(null);

            const activeMembers = useMemo(() => members.filter(m => m.status === 'Normal'), [members]);

            const handleSaveAgenda = () => {
                if (!formData.title || !formData.title.trim()) return setErrorMsg("Judul Agenda Wajib!");
                const safeMinAmount = safeNumber(formData.minAmount);
                if (safeMinAmount <= 0) return setErrorMsg("Nominal harus lebih dari Rp 0!");
                if (selectedAgenda) { setIuranData(iuranData.map(item => item.id === selectedAgenda.id ? { ...item, title: formData.title, minAmount: safeMinAmount, dueDate: formData.dueDate } : item)); showToast('Agenda iuran berhasil diperbarui.'); }
                else { setIuranData([{ id: Date.now(), title: formData.title, minAmount: safeMinAmount, dueDate: formData.dueDate, payments: {}, transferredToKas: 0 }, ...iuranData]); showToast('Agenda iuran baru berhasil dibuat.'); }
                setView('list');
            };

            const handleSavePayments = () => {
                const cleanPayments = {};
                // FIX: Gunakan parseInt untuk memastikan key tersimpan sebagai angka konsisten
                for (let memberId in tempPayments) {
                    const numId = parseInt(memberId);
                    if (tempPayments[memberId] >= selectedAgenda.minAmount) cleanPayments[numId] = safeNumber(tempPayments[memberId]);
                }
                setIuranData(iuranData.map(item => item.id === selectedAgenda.id ? { ...item, payments: cleanPayments } : item));
                setView('list');
                showToast('Rekap pembayaran warga berhasil disimpan.');
            };

            const executeTransferToKas = () => {
                const nominal = safeNumber(transferAmount);
                const sisa = calculateTotal(selectedAgenda.payments || {}) - (selectedAgenda.transferredToKas || 0);
                if (nominal <= 0 || nominal > sisa) return setErrorMsg(`Nominal penarikan maksimal ${formatRp(sisa)}!`);
                setKasRtBalance(prev => prev + nominal);
                setKasRtTransactions(prev => [{ id: Date.now(), date: getLocalDate(), type: 'Pemasukan', category: 'Iuran Umum', description: `Mutasi Iuran: ${selectedAgenda.title}`, amount: nominal }, ...prev]);
                setIuranData(iuranData.map(item => item.id === selectedAgenda.id ? { ...item, transferredToKas: (selectedAgenda.transferredToKas || 0) + nominal } : item));
                setIsTransferModalOpen(false); setView('list');
                showToast(`Berhasil menyetor ${formatRp(nominal)} ke Kas RT.`);
            };

            const calculateTotal = (obj) => { let total = 0; for(let k in obj) total += obj[k]; return total; };

            if (view === 'form') {
                return (
                    <div className="bg-white p-6 sm:p-10 rounded-[32px] border-2 border-slate-200 max-w-2xl mx-auto shadow-xl">
                        <div className="flex items-center gap-5 mb-8 border-b-2 border-slate-100 pb-6"><button onClick={() => { setView('list'); setErrorMsg(''); }} className="w-12 h-12 bg-white text-google-text border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 rounded-full shrink-0 flex justify-center items-center transition-all duration-300 active:scale-95 shadow-sm"><Icon name="arrow_back" className="text-[20px] font-extrabold text-google-text" /></button><h2 className="text-[22px] sm:text-[24px] font-extrabold text-google-text leading-tight tracking-tight">{selectedAgenda ? 'Edit Agenda' : 'Buat Agenda Iuran'}</h2></div>
                        <div className="space-y-6">
                            <div><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Nama / Keperluan Iuran</label><input type="text" value={formData.title} onChange={e => {setFormData({...formData, title: e.target.value}); setErrorMsg('');}} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text placeholder:text-slate-400" placeholder="Misal: Dana 17 Agustus" /></div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Batas Akhir Waktu</label><input type="date" value={formData.dueDate} onChange={e => setFormData({...formData, dueDate: e.target.value})} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text cursor-pointer" /></div>
                                <div><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Tarif Minimal (Rp)</label><input type="number" min="0" value={formData.minAmount} onChange={e => {setFormData({...formData, minAmount: e.target.value}); setErrorMsg('');}} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[15px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text placeholder:text-slate-400" placeholder="0" /></div>
                            </div>
                        </div>
                        {errorMsg && <div className="bg-google-redLight border-2 border-google-red/40 text-google-redDark font-bold text-[13px] px-4 py-3.5 rounded-[16px] mt-6 flex items-center gap-2"><Icon name="error" className="text-[18px] shrink-0"/><span>{errorMsg}</span></div>}
                        <div className="flex justify-end mt-10 pt-6 border-t-2 border-slate-100">
                            <button onClick={handleSaveAgenda} className="bg-google-blue text-white px-8 py-4 rounded-full font-extrabold text-[15px] border-2 border-google-blueDark shadow-md hover:bg-google-blueDark hover:shadow-lg active:scale-95 transition-all duration-300 w-full sm:w-auto flex items-center justify-center gap-2"><Icon name="save" className="text-[20px]"/> Simpan Agenda</button>
                        </div>
                    </div>
                );
            }

            if (view === 'manage') {
                const totalTerkumpul = calculateTotal(tempPayments);
                const lunasCount = activeMembers.filter(m => (tempPayments[m.id] || 0) >= selectedAgenda.minAmount).length;
                const transferred = selectedAgenda.transferredToKas || 0;
                const sisa = totalTerkumpul - transferred;

                return (
                    <div className="space-y-6 max-w-5xl mx-auto">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-5 no-print bg-white p-6 sm:p-8 rounded-[32px] border-2 border-slate-200 shadow-sm">
                            <div className="flex items-center gap-5"><button onClick={() => { setView('list'); setErrorMsg(''); }} className="w-12 h-12 bg-white text-google-text border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 rounded-full shrink-0 flex justify-center items-center transition-all duration-300 active:scale-95 shadow-sm"><Icon name="arrow_back" className="text-[20px] font-extrabold text-google-text" /></button><div><h2 className="text-[22px] sm:text-[24px] font-extrabold text-google-text leading-tight tracking-tight">{selectedAgenda.title}</h2><p className="text-[14px] font-medium text-google-textVariant mt-1">Kelola Penyetoran Warga</p></div></div>
                            {userRole === 'admin' && <button onClick={() => window.print()} className="bg-white text-google-text px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-slate-200 shadow-sm hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2"><Icon name="print" className="text-[18px]" /> <span className="hidden sm:inline">Cetak Laporan</span></button>}
                        </div>

                        <div className="hidden print-only">
                            <div className="kop-surat"><h1>PENGURUS RUKUN TETANGGA (RT)</h1><h1>{identity?.name || ''}</h1></div>
                            <div className="text-center mb-6"><h2 className="text-[14pt] font-bold underline uppercase mb-1">Penerimaan Iuran Umum</h2><p className="text-[11pt]">Agenda: <strong>{selectedAgenda.title}</strong></p></div>
                            <div style={{marginBottom:'15px', fontSize:'11pt'}}><p>Target Minimal per Warga: <strong>{formatRp(selectedAgenda.minAmount)}</strong></p><p>Total Terkumpul: <strong>{formatRp(totalTerkumpul)}</strong></p></div>
                            <table className="print-table">
                                <thead><tr><th width="5%">No</th><th width="35%">Nama Warga</th><th width="20%">Status</th><th width="20%">Nominal Bayar</th><th width="20%">TTD</th></tr></thead>
                                <tbody>
                                    {activeMembers.map((m, idx) => {
                                        const amt = tempPayments[m.id] || 0;
                                        return <tr key={m.id}><td className="text-center font-bold">{idx + 1}</td><td className="font-bold">{m.name}</td><td className="text-center font-bold">{amt >= selectedAgenda.minAmount ? 'LUNAS' : '-'}</td><td className="text-right font-bold">{amt > 0 ? formatRp(amt) : ''}</td><td></td></tr>
                                    })}
                                </tbody>
                            </table>
                            <div className="ttd-container">
                                <div className="ttd-box"><p>Mengetahui,</p><p>Ketua RT</p><div className="ttd-space"></div><p className="ttd-name">( ................................... )</p></div>
                                <div className="ttd-box"><p>Penerima / Bendahara,</p><br/><div className="ttd-space" style={{height:'60px'}}></div><p className="ttd-name">( ................................... )</p></div>
                            </div>
                        </div>

                        <div className="bg-white p-6 sm:p-10 rounded-[32px] border-2 border-slate-200 shadow-sm no-print">
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-10">
                                <div className="bg-slate-50 p-6 rounded-[24px] border-2 border-slate-200 text-center shadow-sm"><p className="text-[11px] font-extrabold text-google-textVariant uppercase tracking-widest mb-2">Target / Warga</p><p className="text-[24px] font-extrabold text-google-text tracking-tight">{formatRp(selectedAgenda.minAmount)}</p></div>
                                <div className="bg-google-greenLight p-6 rounded-[24px] border-2 border-google-green/30 text-center shadow-sm"><p className="text-[11px] font-extrabold text-google-greenDark uppercase tracking-widest mb-2">Dana Terkumpul</p><p className="text-[24px] font-extrabold text-google-greenDark tracking-tight">{formatRp(totalTerkumpul)}</p></div>
                                <div className="bg-gradient-to-br from-google-blueLight to-blue-50 p-6 rounded-[24px] border-2 border-google-blue/30 text-center flex flex-col items-center relative shadow-sm hover:shadow-md transition-shadow group"><p className="text-[11px] font-extrabold text-google-blueDark uppercase tracking-widest mb-2">Sisa (Belum Disetor)</p><p className="text-[24px] font-extrabold text-google-blueDark group-hover:scale-105 transition-transform tracking-tight">{formatRp(sisa)}</p>
                                    {userRole === 'admin' && sisa > 0 && <button onClick={() => { 
                                            const savedTotal = calculateTotal(selectedAgenda.payments || {});
                                            const currentTotal = calculateTotal(tempPayments);
                                            if (savedTotal !== currentTotal) { setErrorMsg('Simpan Rekap Warga dulu sebelum menyetor dana!'); return; }
                                            setIsTransferModalOpen(true); setErrorMsg(''); 
                                        }} className="absolute -bottom-5 bg-google-blue text-white text-[13px] font-extrabold px-6 py-2.5 rounded-full border-2 border-google-blueDark shadow-lg hover:bg-google-blueDark hover:-translate-y-1 active:scale-95 transition-all flex items-center gap-1.5"><Icon name="sync_alt" className="text-[16px]" /> Setor ke Kas Utama</button>}
                                </div>
                            </div>
                            
                            <div className="bg-slate-50 border-2 border-slate-200 p-6 rounded-[24px] mb-10 shadow-sm">
                                <div className="flex justify-between items-end mb-4"><span className="text-[14px] font-extrabold text-google-textVariant">Progres Pelunasan Warga</span><span className="text-[20px] font-extrabold text-google-blueDark leading-none">{lunasCount} <span className="text-[15px] text-google-textVariant">/ {activeMembers.length}</span></span></div>
                                <div className="w-full h-3.5 bg-slate-200 rounded-full overflow-hidden inset-shadow-sm"><div className="bg-gradient-to-r from-google-blue to-google-blueDark h-full rounded-full transition-all duration-1000" style={{ width: `${activeMembers.length === 0 ? 0 : (lunasCount / activeMembers.length) * 100}%` }}></div></div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                                {activeMembers.map(member => {
                                    const amountPaid = tempPayments[member.id] || 0;
                                    const isLunas = amountPaid >= selectedAgenda.minAmount;
                                    const isError = amountPaid > 0 && amountPaid < selectedAgenda.minAmount;
                                    return (
                                        <div key={member.id} className={`p-6 rounded-[24px] border-2 flex flex-col justify-between transition-all duration-300 group ${userRole === 'admin' ? (isError ? 'bg-google-redLight border-google-red hover:shadow-lg' : 'bg-white border-slate-200 hover:border-google-blue hover:shadow-xl hover:-translate-y-1') : (isLunas ? 'bg-google-greenLight border-google-green shadow-sm' : 'bg-slate-50 border-slate-200')}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <h3 className="font-extrabold text-[16px] text-google-text truncate pr-3 group-hover:text-google-blue transition-colors leading-tight">{member.name}</h3>
                                                {isLunas ? <span className="text-[10px] bg-google-green text-white px-3 py-1.5 rounded-md font-extrabold uppercase tracking-widest shadow-sm flex items-center gap-1 shrink-0 border border-google-greenDark"><Icon name="check" className="text-[12px]"/> LUNAS</span> : <span className="text-[10px] bg-slate-200 text-google-textVariant px-3 py-1.5 rounded-md font-extrabold uppercase tracking-widest shrink-0 border border-slate-300">BELUM</span>}
                                            </div>
                                            {userRole === 'admin' ? (
                                                <div>
                                                    <div className={`flex items-center bg-slate-50 rounded-[16px] px-4 py-3 border-2 transition-colors duration-300 ${isError ? 'border-google-red' : 'border-slate-200 focus-within:border-google-blue focus-within:bg-white focus-within:shadow-md'}`}>
                                                        <span className="text-[15px] font-extrabold text-google-textVariant mr-2">Rp</span>
                                                        <input type="number" min="0" value={tempPayments[member.id] || ''} onChange={(e) => { setTempPayments(prev => ({...prev, [member.id]: safeNumber(e.target.value)})); setErrorMsg(''); }} className="w-full bg-transparent border-none text-[16px] font-bold outline-none p-0 text-google-text placeholder:text-slate-300" placeholder="0" />
                                                    </div>
                                                    {isError && <p className="text-[11px] font-extrabold text-google-redDark mt-2.5 ml-1 flex items-center gap-1.5"><Icon name="info" className="text-[14px]" /> Kurang dari {formatRp(selectedAgenda.minAmount)}</p>}
                                                </div>
                                            ) : (
                                                <div className="text-[13px] font-bold mt-2 bg-white p-3.5 rounded-[16px] border-2 border-slate-100 flex items-center gap-2.5 shadow-sm">
                                                    {isLunas ? <><Icon name="task_alt" className="text-[20px] text-google-greenDark" /><span className="text-google-greenDark">Memenuhi Syarat</span></> : <><Icon name="pending" className="text-[20px] text-google-textVariant" /><span className="text-google-textVariant">Menunggu Penyetoran</span></>}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            {userRole === 'admin' && (
                                <div className="mt-10 pt-8 border-t-2 border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-5">
                                    {errorMsg ? <div className="bg-google-redLight border-2 border-google-red/40 text-google-redDark font-bold text-[13px] px-5 py-4 rounded-[16px] w-full sm:w-auto flex items-center gap-2"><Icon name="error" className="text-[18px] shrink-0"/><span>{errorMsg}</span></div> : <div></div>}
                                    <button onClick={handleSavePayments} className="w-full sm:w-auto bg-google-blue text-white px-10 py-4 rounded-full font-extrabold text-[15px] border-2 border-google-blueDark shadow-md hover:bg-google-blueDark hover:shadow-lg active:scale-95 transition-all duration-300 flex items-center justify-center gap-2"><Icon name="save" className="text-[20px]" /> Simpan Rekap Warga</button>
                                </div>
                            )}
                        </div>

                        {isTransferModalOpen && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-6 no-print transition-opacity">
                                <div className="max-h-[85vh] overflow-y-auto hide-scrollbar bg-white rounded-[32px] p-8 w-full max-w-sm text-center shadow-2xl border-2 border-slate-200 transform scale-100 transition-transform">
                                    <div className="mb-6 bg-google-yellowLight w-24 h-24 rounded-full flex items-center justify-center mx-auto border-2 border-google-yellow/30"><Icon name="move_to_inbox" className="text-[48px] text-google-yellowDark" fill="true" /></div>
                                    <h3 className="text-2xl font-extrabold text-google-text mb-2 tracking-tight">Setor ke Kas RT</h3>
                                    <p className="text-[14px] font-medium text-google-textVariant mb-8 leading-relaxed">Mutasi dana fisik dari Iuran ke Saldo Buku Kas Utama.</p>
                                    
                                    <div className="bg-slate-50 p-6 rounded-[24px] mb-8 border-2 border-slate-200 shadow-sm"><p className="text-[11px] font-extrabold text-google-textVariant uppercase tracking-widest mb-2">Batas Maksimal Tarik</p><p className="text-[28px] font-extrabold text-google-text tracking-tight">{formatRp(sisa)}</p></div>
                                    
                                    <div className="text-left mb-8"><label className="text-[11px] font-extrabold text-google-textVariant block mb-2 ml-1 uppercase tracking-widest">Nominal Disetor (Rp)</label><input type="number" min="0" value={transferAmount} onChange={e => {setTransferAmount(safeNumber(e.target.value)); setErrorMsg('');}} className="w-full bg-slate-50 border-2 border-slate-200 focus:border-google-blue focus:bg-white focus:shadow-md p-4 text-[18px] font-bold outline-none rounded-[16px] transition-all duration-300 text-google-text placeholder:text-slate-400" placeholder="0" /></div>
                                    
                                    {errorMsg && <div className="bg-google-redLight border-2 border-google-red/40 text-google-redDark font-bold text-[13px] px-4 py-3.5 rounded-[16px] mb-8 flex items-center gap-2 text-left"><Icon name="error" className="text-[18px] shrink-0"/><span>{errorMsg}</span></div>}
                                    
                                    <div className="flex gap-3">
                                        <button onClick={() => { setIsTransferModalOpen(false); setErrorMsg(''); }} className="flex-1 bg-white text-google-text px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-all duration-300 shadow-sm flex items-center justify-center">Batal</button>
                                        <button onClick={executeTransferToKas} className="flex-1 bg-google-yellow text-white px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-google-yellowDark shadow-md hover:bg-google-yellowDark hover:shadow-lg active:scale-95 transition-all duration-300 flex items-center justify-center gap-2">Setor Dana</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-5 bg-white p-6 sm:p-8 rounded-[32px] border-2 border-slate-200 shadow-sm no-print">
                        <div><h2 className="text-2xl font-extrabold text-google-text tracking-tight">Agenda Iuran Umum</h2><p className="text-[14px] font-medium text-google-textVariant mt-1.5">Penggalangan dana non-arisan (berlaku untuk semua warga).</p></div>
                        {userRole === 'admin' && <button onClick={() => { setFormData({ title: '', minAmount: 0, dueDate: getLocalDate(), payments: {}, transferredToKas: 0 }); setSelectedAgenda(null); setView('form'); setErrorMsg(''); }} className="shrink-0 bg-google-blue text-white px-8 py-3.5 rounded-full font-extrabold flex items-center gap-2 text-[14px] border-2 border-google-blueDark shadow-md hover:bg-google-blueDark hover:shadow-lg active:scale-95 transition-all duration-300 w-full sm:w-auto justify-center"><Icon name="add_task" className="text-[20px]" /><span>Buat Agenda Baru</span></button>}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 md:gap-6">
                        {iuranData.map(agenda => {
                            const payments = agenda.payments || {};
                            const totalTerkumpul = calculateTotal(payments);
                            const lunasCount = activeMembers.filter(m => payments[m.id] >= agenda.minAmount).length;
                            const progressPercent = activeMembers.length === 0 ? 0 : (lunasCount / activeMembers.length) * 100;

                            return (
                                <div key={agenda.id} className="bg-white rounded-[32px] p-6 sm:p-8 border-2 border-slate-200 shadow-sm flex flex-col justify-between hover:shadow-2xl hover:-translate-y-1.5 hover:border-google-blue/40 transition-all duration-300 group">
                                    <div>
                                        <h3 className="text-[24px] font-extrabold text-google-text leading-snug mb-6 group-hover:text-google-blue transition-colors tracking-tight">{agenda.title}</h3>
                                        <div className="flex flex-col sm:flex-row gap-4 mb-8">
                                            <div className="flex-1 flex items-center gap-4 bg-slate-50 p-4 rounded-[20px] border-2 border-slate-200 shadow-sm"><div className="w-12 h-12 rounded-full bg-google-blueLight flex items-center justify-center text-google-blue border border-google-blue/20"><Icon name="event" className="text-[24px]" fill="true"/></div><div><p className="text-[10px] font-extrabold text-google-textVariant uppercase tracking-widest mb-1">Batas Akhir</p><p className="text-[14px] font-bold text-google-text">{parseLocalDate(agenda.dueDate).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year:'numeric'})}</p></div></div>
                                            <div className="flex-1 flex items-center gap-4 bg-slate-50 p-4 rounded-[20px] border-2 border-slate-200 shadow-sm"><div className="w-12 h-12 rounded-full bg-google-greenLight flex items-center justify-center text-google-green border border-google-green/20"><Icon name="payments" className="text-[24px]" fill="true"/></div><div><p className="text-[10px] font-extrabold text-google-textVariant uppercase tracking-widest mb-1">Target Minimal</p><p className="text-[15px] font-extrabold text-google-text">{formatRp(agenda.minAmount)}</p></div></div>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-[24px] border-2 border-slate-200 mb-8 shadow-sm">
                                            <div className="flex justify-between items-end mb-4"><span className="text-[13px] font-bold text-google-textVariant">Progres Warga Lunas</span><span className="text-[18px] font-extrabold text-google-blueDark leading-none">{lunasCount} <span className="text-[13px] text-google-textVariant">/ {activeMembers.length}</span></span></div>
                                            <div className="w-full h-3 bg-slate-200 rounded-full overflow-hidden inset-shadow-sm"><div className="bg-gradient-to-r from-google-blue to-google-blueDark h-full rounded-full transition-all duration-1000" style={{ width: `${progressPercent}%` }}></div></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-5 pt-6 border-t-2 border-slate-100">
                                        <div className="bg-google-greenLight/50 px-5 py-3.5 rounded-[16px] border-2 border-google-green/20"><p className="text-[10px] text-google-greenDark uppercase tracking-widest font-extrabold mb-1">Total Dana Terkumpul</p><p className="text-[22px] font-extrabold text-google-greenDark tracking-tight truncate">{userRole === 'admin' ? formatRp(totalTerkumpul) : '🔒 Disembunyikan'}</p></div>
                                        {userRole === 'admin' ? (
                                            <div className="flex items-center gap-3 shrink-0 self-end sm:self-auto">
                                                <button onClick={() => { setSelectedAgenda(agenda); setTempPayments(agenda.payments || {}); setView('manage'); }} className="px-6 py-3.5 bg-google-blueLight text-google-blueDark border-2 border-google-blue/30 rounded-full text-[14px] font-extrabold hover:bg-google-blue hover:text-white transition-all duration-300 hover:shadow-md active:scale-95 flex items-center gap-1.5"><Icon name="edit_document" className="text-[18px]"/> Kelola</button>
                                                <button onClick={() => { setFormData({ title: agenda.title, minAmount: agenda.minAmount, dueDate: agenda.dueDate, payments: agenda.payments || {}, transferredToKas: agenda.transferredToKas || 0 }); setSelectedAgenda(agenda); setView('form'); setErrorMsg(''); }} className="w-12 h-12 flex items-center justify-center bg-white text-google-text hover:bg-slate-50 hover:border-slate-300 rounded-full border-2 border-slate-200 active:scale-95 transition-all duration-300 shadow-sm"><Icon name="settings" className="text-[20px]" /></button>
                                                <button onClick={() => setDeleteConfirmAgendaId(agenda.id)} className="w-12 h-12 flex items-center justify-center bg-white text-google-red hover:bg-google-redLight hover:border-google-red/40 rounded-full border-2 border-slate-200 active:scale-95 transition-all duration-300 shadow-sm"><Icon name="delete" className="text-[20px]" /></button>
                                            </div>
                                        ) : (
                                            <button onClick={() => { setSelectedAgenda(agenda); setTempPayments(agenda.payments || {}); setView('manage'); }} className="px-8 py-3.5 bg-white border-2 border-slate-200 text-google-text rounded-full text-[14px] font-extrabold hover:bg-slate-50 hover:border-slate-300 shadow-sm shrink-0 active:scale-95 transition-all duration-300 self-end sm:self-auto flex items-center gap-2"><Icon name="visibility" className="text-[18px]"/> Cek Status Saya</button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    {iuranData.length === 0 && <div className="bg-white rounded-[32px] border-2 border-slate-200 p-12 text-center shadow-sm"><div className="bg-slate-50 w-24 h-24 flex items-center justify-center rounded-full mb-6 mx-auto border-2 border-slate-200"><Icon name="volunteer_activism" className="text-[48px] text-google-red" fill="true" /></div><h3 className="text-google-text font-extrabold text-[22px] mb-2 tracking-tight">Belum Ada Agenda Iuran</h3><p className="text-google-textVariant font-medium text-[15px]">Daftar donasi atau tagihan umum akan tampil di sini.</p></div>}

                    {/* FIX: Modal konfirmasi hapus agenda */}
                    {deleteConfirmAgendaId && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-6 no-print transition-opacity">
                            <div className="max-h-[85vh] overflow-y-auto hide-scrollbar bg-white rounded-[32px] p-8 w-full max-w-sm text-center shadow-2xl border-2 border-slate-200">
                                <div className="mb-5 bg-google-redLight w-20 h-20 rounded-full flex items-center justify-center mx-auto border-2 border-google-red/30"><Icon name="delete" className="text-[40px] text-google-red" /></div>
                                <h3 className="text-2xl font-extrabold text-google-text mb-2 tracking-tight">Hapus Agenda?</h3>
                                <p className="text-[14px] font-medium text-google-textVariant mb-8 leading-relaxed">Agenda iuran beserta seluruh data pembayaran warga akan dihapus permanen.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setDeleteConfirmAgendaId(null)} className="flex-1 bg-white text-google-text px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-slate-200 hover:bg-slate-50 active:scale-95 transition-all duration-300 shadow-sm">Batal</button>
                                    <button onClick={() => { setIuranData(iuranData.filter(i => i.id !== deleteConfirmAgendaId)); setDeleteConfirmAgendaId(null); showToast('Agenda iuran berhasil dihapus.'); }} className="flex-1 bg-google-red text-white px-6 py-3.5 rounded-full font-extrabold text-[14px] border-2 border-google-redDark shadow-md hover:bg-google-redDark active:scale-95 transition-all duration-300">Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function BukuKas({ balance, setBalance, transactions, setTransactions, userRole, identity, jimpitanBalance, setJimpitanBalance }) {
            // Komponen BukuKas untuk pencatatan transaksi Kas RT Utama
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isTransferModalOpen, setIsTransferModalOpen] = useState(false);
            const [transferAmount, setTransferAmount] = useState('');
            const [formData, setFormData] = useState({ type: 'Pengeluaran', category: 'Pembelian Barang', description: '', amount: '', date: getLocalDate(), receiptUrl: null });
            const [errorMsg, setErrorMsg] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            const [editingId, setEditingId] = useState(null);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2 * 1024 * 1024) return setErrorMsg("Ukuran gambar maksimal 2MB!");

                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64String = reader.result.split(',')[1];
                    setIsUploading(true); setErrorMsg('');

                    const gasUrl = window.GAS_DRIVE_URL; 
                    fetch(gasUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ base64: base64String, mimeType: file.type, filename: `bukukas-${Date.now()}-${file.name}` })
                    })
                    .then(res => res.json())
                    .then(response => {
                        setIsUploading(false);
                        if (response.status === 'success') { setFormData(prev => ({ ...prev, receiptUrl: response.viewUrl })); } 
                        else { setErrorMsg('Gagal mengunggah nota: ' + response.message); }
                    })
                    .catch(err => {
                        setIsUploading(false); setErrorMsg('Terjadi kesalahan jaringan saat mengunggah nota.');
                    });
                };
                reader.readAsDataURL(file);
            };

            const handleSave = () => {
                if (!formData.description) return setErrorMsg("Keterangan wajib diisi!");
                const nominal = safeNumber(formData.amount);
                if (nominal <= 0) return setErrorMsg("Nominal harus lebih dari Rp 0!");
                
                if (editingId) {
                    const oldTx = transactions.find(t => t.id === editingId);
                    let tempBalance = balance;
                    if (oldTx.type === 'Pemasukan') tempBalance -= oldTx.amount;
                    else tempBalance += oldTx.amount;
                    
                    if (formData.type === 'Pengeluaran' && nominal > tempBalance) return setErrorMsg(`Saldo tidak cukup! Saldo saat ini ${formatRp(tempBalance)}`);
                    
                    if (formData.type === 'Pemasukan') tempBalance += nominal;
                    else tempBalance -= nominal;
                    
                    setBalance(tempBalance);
                    setTransactions(transactions.map(t => t.id === editingId ? { ...formData, amount: nominal } : t));
                    setEditingId(null);
                    showToast(`Transaksi berhasil diperbarui.`);
                } else {
                    if (formData.type === 'Pengeluaran' && nominal > balance) return setErrorMsg(`Saldo tidak cukup! Saldo saat ini ${formatRp(balance)}`);
                    if (formData.type === 'Pemasukan') setBalance(prev => prev + nominal); else setBalance(prev => prev - nominal);
                    setTransactions([{ id: Date.now(), ...formData, amount: nominal }, ...transactions]);
                    showToast(`Transaksi ${formData.type.toLowerCase()} berhasil dicatat.`);
                }
                
                setIsModalOpen(false); setFormData({ type: 'Pengeluaran', category: 'Belanja Barang/Alat', description: '', amount: '', date: getLocalDate(), receiptUrl: null });
                setIsUploading(false);
            };

            const handleTransferJimpitan = () => {
                const nominal = safeNumber(transferAmount);
                if (nominal <= 0 || nominal > jimpitanBalance) return setErrorMsg(`Penarikan tidak valid! Maksimal ${formatRp(jimpitanBalance)}`);
                setJimpitanBalance(prev => prev - nominal); setBalance(prev => prev + nominal);
                setTransactions([{ id: Date.now(), type: 'Pemasukan', category: 'Mutasi Jimpitan', description: 'Pencairan Kas Jimpitan', amount: nominal, date: getLocalDate() }, ...transactions]);
                setIsTransferModalOpen(false); setTransferAmount('');
                showToast(`Berhasil mencairkan ${formatRp(nominal)} dari Kas Jimpitan.`);
            };

            return (
                <div className="space-y-6 print:p-0">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-5 bg-white p-6 sm:p-8 rounded-[32px] border-2 border-slate-200 shadow-sm no-print">
                        <div><h2 className="text-2xl font-extrabold text-google-text tracking-tight">Buku Kas Utama</h2><p className="text-[14px] font-medium text-google-textVariant mt-1.5">Catatan riwayat transaksi operasional RT.</p></div>
                        <button onClick={() => window.print()} className="bg-white text-google-text px-6 py-3.5 rounded-full font-extrabold flex items-center gap-2 text-[14px] border-2 border-slate-200 shadow-sm hover:shadow-md hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-all duration-300 w-full sm:w-auto"><Icon name="print" className="text-[18px]" /> <span>Cetak Laporan</span></button>
                    </div>

                    <div className="hidden print-only">
                        <div className="kop-surat"><h1>PENGURUS RUKUN TETANGGA (RT)</h1><h1>{identity?.name || ''}</h1></div>
                        <div className="text-center mb-6"><h2 className="text-[14pt] font-bold underline uppercase mb-1">Buku Kas Umum</h2><p className="text-[11pt]">Per Tanggal: {new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long', year:'numeric'})}</p></div>
                        <table className="print-table">
                            <thead><tr><th width="5%">No</th><th width="15%">Tanggal</th><th width="40%">Uraian Transaksi</th><th width="20%">Pemasukan</th><th width="20%">Pengeluaran</th></tr></thead>
                            <tbody>
                                {transactions.length === 0 ? <tr><td colSpan="5" className="text-center font-bold">Nihil / Belum ada transaksi</td></tr> : transactions.map((t, idx) => (

        function Pertemuan({ members, setMembers, currentRound, setCurrentRound, jimpitanBalance, setJimpitanBalance, setMeetingHistory, onFinish, nominalArisan, nominalJimpitan, arisanPeriod, setArisanPeriod, identity, cycleNumber }) {
            const [step, setStep] = useState(1);
            const [showHolidayModal, setShowHolidayModal] = useState(false);
            const [meetingDate, setMeetingDate] = useState(getLocalDate());
            const arisanMembers = useMemo(() => members.filter(m => m.program !== 'IuranOnly'), [members]);
            
            const eligibleWinners = useMemo(() => arisanMembers.filter(m => !m.hasWon && !isNonaktif(m)), [arisanMembers]);
            const isCycleAlreadyComplete = arisanMembers.length > 0 && eligibleWinners.length === 0;

            const [attendance, setAttendance] = useState(() => {
                const init = {}; arisanMembers.forEach(m => init[m.id] = { status: 'Hadir', payDebt: false }); return init;
            });
            
            // FIX: Sinkronisasi attendance jika ada warga baru yang ditambahkan saat form Pertemuan terbuka
            useEffect(() => {
                setAttendance(prev => {
                    const updated = { ...prev };
                    arisanMembers.forEach(m => {
                        if (!updated[m.id]) {
                            updated[m.id] = { status: 'Hadir', payDebt: false };
                        }
                    });
                    return updated;
                });
            }, [arisanMembers]);
            const [selectedWinnerId, setSelectedWinnerId] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            
            const calculations = useMemo(() => {
                let kasArisanTerkumpul = 0, kasJimpitanTerkumpul = 0, talanganJimpitan = 0, pelunasanTunggakan = 0, tunggakanBaru = 0;
                arisanMembers.forEach(m => {
                    const att = attendance[m.id];
                    if (!att) return; // guard: warga belum ada di attendance (ditambah setelah form buka)
                    if (isNonaktif(m)) { if (att.status === 'Hadir') kasJimpitanTerkumpul += nominalJimpitan; return; } // Nonaktif/Meninggal: hanya jimpitan
                    if (att.status === 'Hadir') { kasArisanTerkumpul += nominalArisan; kasJimpitanTerkumpul += nominalJimpitan; if (m.debt > 0 && att.payDebt) pelunasanTunggakan += m.debt; } 
                    else if (att.status === 'Alfa' || att.status === 'Musibah') { talanganJimpitan += nominalArisan; kasArisanTerkumpul += nominalArisan; tunggakanBaru += (nominalArisan + nominalJimpitan); }
                });
                // LOGIKA ARISAN: Pemenang tidak membayar ke dirinya sendiri.
                // Kurangi nominalArisan pemenang dari total yang diserahkan, KECUALI
                // pemenang tidak hadir (sudah tidak terhitung di kasArisanTerkumpul via Hadir).
                const winnerMember = selectedWinnerId ? arisanMembers.find(m => m.id === Number(selectedWinnerId)) : null;
                const winnerAtt = winnerMember ? attendance[winnerMember.id] : null;
                const winnerIsPresent = winnerAtt && winnerAtt.status === 'Hadir' && !isNonaktif(winnerMember);
                if (!isCycleAlreadyComplete && winnerIsPresent) {
                    kasArisanTerkumpul -= nominalArisan;
                }
                return { kasArisanTerkumpul, kasJimpitanTerkumpul, talanganJimpitan, pelunasanTunggakan, tunggakanBaru };
            }, [arisanMembers, attendance, nominalArisan, nominalJimpitan, selectedWinnerId, isCycleAlreadyComplete]);

            const currentTotalDebt = useMemo(() => members.reduce((sum, m) => sum + (m.debt || 0), 0), [members]);
            const deltaJimpitan = calculations.kasJimpitanTerkumpul + calculations.pelunasanTunggakan - calculations.talanganJimpitan;
            const projectedJimpitanCash = jimpitanBalance + deltaJimpitan;
            const projectedTotalDebt = currentTotalDebt + calculations.tunggakanBaru - calculations.pelunasanTunggakan;

            const handleAttendanceChange = (id, status) => setAttendance(prev => ({...prev, [id]: { ...prev[id], status }}));
            const togglePayDebt = (id) => setAttendance(prev => ({...prev, [id]: { ...prev[id], payDebt: !prev[id].payDebt }}));

            const submitPertemuan = () => {
                if (!isCycleAlreadyComplete && !selectedWinnerId) return setErrorMsg("Pilih pemenang arisan terlebih dahulu!");
                
                setJimpitanBalance(prev => prev + deltaJimpitan); // FIX KRITIS-3: functional update untuk hindari race condition
                let winnerName = "", absensiDetails = [];
                const updatedMembers = members.map(m => {
                    if (m.program === 'IuranOnly') return m;
                    let updatedM = { ...m };
                    const att = attendance[m.id];
                    // Guard: jika warga arisan tidak ada di attendance (baru ditambah setelah form dibuka)
                    if (!att) { absensiDetails.push({ name: m.name, status: 'Hadir' }); return updatedM; }
                    if (!isCycleAlreadyComplete && m.id === Number(selectedWinnerId)) { 
                        updatedM.hasWon = true; updatedM.wonRound = currentRound; winnerName = m.name; 
                    }
                    // FIX CELAH-1: Guard Meninggal SEBELUM push absensiDetails
                    // Warga Meninggal dicatat dengan status khusus 'Meninggal', bebas dari arisan

                    return updatedM;
