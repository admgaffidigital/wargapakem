<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset='UTF-8'/>

  <meta content='width=device-width, initial-scale=1.0, viewport-fit=cover' name='viewport'/>
  <title>Portal Warga RT - PAKEM | Banyuanyar Gurah Kediri</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="Portal digital warga RT Pakem, Banyuanyar, Gurah, Kediri. Kelola arisan, keuangan kas RT, buku warga, galeri, pengaduan, dan informasi lingkungan secara mudah dan transparan." />
  <meta name="keywords" content="portal warga RT, Pakem, Banyuanyar, Gurah, Kediri, arisan, kas RT, aplikasi RT" />
  <meta name="author" content="Admin Warga RT PAKEM" />

  <!-- Open Graph (WhatsApp, Facebook share preview) -->
  <meta property="og:title" content="Portal Warga RT - PAKEM | Banyuanyar Gurah Kediri" />
  <meta property="og:description" content="Portal digital warga RT Pakem — kelola arisan, kas RT, buku warga, galeri, dan laporan pengaduan." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wargapakem.vercel.app/" />
  <meta property="og:image" content="https://wargapakem.vercel.app/National_emblem_of_Indonesia_Garuda_Pancasila.svg" />

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Portal Warga RT - PAKEM" />
  <meta name="twitter:description" content="Portal digital warga RT Pakem — arisan, kas, galeri &amp; pengaduan." />

  <!-- PWA: Install to Homescreen -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS / Safari PWA -->
  <meta content="yes" name="apple-mobile-web-app-capable" />
  <meta content="default" name="apple-mobile-web-app-status-bar-style" />
  <meta content="Portal Warga RT - PAKEM" name="apple-mobile-web-app-title" />
  <link rel="apple-touch-icon" href="/pwa-icon.svg" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/National_emblem_of_Indonesia_Garuda_Pancasila.svg" />

  <!-- Android / Chrome PWA -->
  <meta content="yes" name="mobile-web-app-capable" />
  <meta content="Portal Warga RT - PAKEM" name="application-name" />
  <meta content="#dc2626" name="theme-color" />
  <meta content="#dc2626" name="background-color" />

  <!-- DNS Prefetch & Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://www.gstatic.com" />

  <!-- Fonts Preload (Performance) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Outfit:wght@400;500;600;700;800&display=swap" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0..1,0&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Outfit:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0..1,0&display=swap" />

  <!-- Loading screen style (inline agar tampil sebelum JS load) -->
  <style>
    body { margin: 0; background: #dc2626; }
    #loading-screen {
      position: fixed; inset: 0; background: #dc2626;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 99999;
    }
    .loading-icon-wrap {
      background: rgba(255,255,255,0.1); padding: 24px; border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: ldpulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .loading-icon-wrap img { width: 100px; height: 100px; object-fit: contain; }
    .loading-dots { margin-top: 24px; display: flex; align-items: center; gap: 8px; }
    .loading-dots span {
      width: 8px; height: 8px; background: white; border-radius: 50%;
      animation: ldbounce 1.4s infinite ease-in-out both;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes ldpulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    @keyframes ldbounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root">
    <!-- Loading screen tampil sebelum React selesai mount -->
    <div id="loading-screen">
      <div class="loading-icon-wrap">
        <img src="/National_emblem_of_Indonesia_Garuda_Pancasila.svg" alt="Garuda Pancasila" width="100" height="100" fetchpriority="high" />
      </div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js')
          .then(function (reg) { console.log('[SW] Terdaftar:', reg.scope); })
          .catch(function (err) { console.warn('[SW] Gagal daftar:', err); });
      });
    }
  </script>

  <!-- Vite entry point -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
